server:
  port: 8080
  compression:
    enabled: true
    min-response-size: 1024
  tomcat:
    threads:
      max: 600
      min-spare: 64
    accept-count: 5000
    max-connections: 32768
    connection-timeout: 5s

spring:
  application:
    name: kawang-shop
  http:
    converters:
      preferred-json-mapper: jackson2
  datasource:
    url: jdbc:mysql://localhost:3306/test?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true&cachePrepStmts=true&prepStmtCacheSize=256&prepStmtCacheSqlLimit=2048&useServerPrepStmts=true&rewriteBatchedStatements=true&maintainTimeStats=false
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      pool-name: kawang-hikari
      maximum-pool-size: 60
      minimum-idle: 16
      auto-commit: true
      connection-timeout: 3000
      validation-timeout: 1000
      idle-timeout: 600000
      max-lifetime: 1800000
      keepalive-time: 300000
  sql:
    init:
      mode: always
      encoding: UTF-8
  data:
    redis:
      host: localhost
      port: 6379
      database: 2
      lettuce:
        pool:
          max-active: 64
          max-idle: 16
          min-idle: 4
          max-wait: 3s
  servlet:
    multipart:
      max-file-size: 1000MB
      max-request-size: 1200MB
  mail:
    host: smtp.qq.com
    port: 465
    username: "****"
    password: "****"
    protocol: smtp
    default-encoding: utf-8
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

mybatis:
  mapper-locations: classpath*:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
    default-fetch-size: 100
    default-statement-timeout: 5
    default-executor-type: REUSE

shop:
  bootstrap:
    seed-demo-card-keys: false
  security:
    jwt:
      secret: "shop-demo-jwt-secret-key-please-change-this"
      expire-hours: 12
    admin:
      username: aaa
      password: 123456
      display-name: Super Admin
  crypto:
    aes-key: "shop-demo-aes-key-please-change-this"
  push:
    huawei:
      enabled: ${SHOP_PUSH_HUAWEI_ENABLED:false}
      app-id: ${SHOP_PUSH_HUAWEI_APP_ID:}
      client-id: ${SHOP_PUSH_HUAWEI_CLIENT_ID:}
      client-secret: ${SHOP_PUSH_HUAWEI_CLIENT_SECRET:}
      token-url: ${SHOP_PUSH_HUAWEI_TOKEN_URL:https://oauth-login.cloud.huawei.com/oauth2/v3/token}
      api-base-url: ${SHOP_PUSH_HUAWEI_API_BASE_URL:https://push-api.cloud.huawei.com}
  storage:
    base-path: "./storage"
  cors:
    allowed-origins:
      - http://localhost:5173
      - http://localhost:5174
      - http://127.0.0.1:5173
      - http://127.0.0.1:5174
management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
      roles: ADMIN
  metrics:
    tags:
      application: ${spring.application.name}
